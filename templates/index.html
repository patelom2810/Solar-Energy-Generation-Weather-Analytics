<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered Solar Energy Generation Predictor.">
    <title>Solar Energy Prediction | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-input: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            background-image: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }


        .clouds-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
        }
        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.03);
            border-radius: 100px; filter: blur(4px);
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.03); border-radius: 50%;
        }
        .cloud1 { width: 300px; height: 100px; top: 20%; left: -300px; animation: floatCloud 45s linear infinite; }
        .cloud1::before { width: 150px; height: 150px; top: -60px; left: 40px; }
        .cloud1::after { width: 120px; height: 120px; top: -40px; left: 140px; }

        .cloud2 { width: 250px; height: 80px; top: 60%; left: -250px; animation: floatCloud 35s linear infinite; animation-delay: -10s; }
        .cloud2::before { width: 120px; height: 120px; top: -50px; left: 30px; }
        .cloud2::after { width: 100px; height: 100px; top: -30px; left: 110px; }

        .cloud3 { width: 400px; height: 120px; top: 85%; left: -400px; animation: floatCloud 55s linear infinite; animation-delay: -25s; }
        .cloud3::before { width: 180px; height: 180px; top: -80px; left: 60px; }
        .cloud3::after { width: 140px; height: 140px; top: -50px; left: 200px; }

        @keyframes floatCloud {
            0% { transform: translateX(-10vw); }
            100% { transform: translateX(110vw); }
        }


        main.container {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header.header {
            text-align: center; margin-bottom: 35px; padding-bottom: 25px; border-bottom: 1px solid var(--border-glass);
        }

        h1 {
            font-size: 32px; font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px;
        }

        .subtitle { color: var(--text-muted); font-size: 15px; font-weight: 400; }

        .form-group { margin-bottom: 20px; position: relative; }

        label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--text-muted); transition: color 0.3s; }
        .form-group:focus-within label { color: var(--accent-cyan); }

        input[type="number"], select {
            width: 100%; padding: 14px 16px; background: var(--bg-input); border: 1px solid var(--border-glass);
            border-radius: 10px; color: var(--text-main); font-family: inherit; font-size: 15px; transition: all 0.3s ease;
        }
        input[type="number"]:focus, select:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1); background: rgba(15, 23, 42, 0.8); }

        .checkbox-group { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 16px; background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.2); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .checkbox-group:hover { background: rgba(6, 182, 212, 0.1); }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent-cyan); cursor: pointer; }
        .checkbox-group label { margin: 0; cursor: pointer; color: var(--text-main); font-weight: 500; }

        button {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px -10px rgba(6, 182, 212, 0.5);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(6, 182, 212, 0.7); }

        #result { margin-top: 24px; padding: 20px; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-left: 4px solid var(--success); border-radius: 10px; display: none; }
        #result.show { display: block; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 15px; }
        .result-value { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .status-success { color: var(--success); font-weight: 600; display:flex; align-items:center; gap:6px; }
        .status-warning { color: var(--warning); font-weight: 600; display:flex; align-items:center; gap:6px; }

        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .back-link a:hover { color: var(--text-main); gap: 12px; }

        .loading { text-align: center; color: var(--accent-cyan); padding: 10px; display:flex; justify-content:center; gap:8px; align-items:center;}
        .loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        option { background: var(--bg-dark); }
    </style>
</head>
<body>


    <div class="clouds-bg">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>


<main class="container">
    <header class="header">
        <h1><i class="fas fa-wand-magic-sparkles" style="color: var(--accent-cyan);"></i> Solar Predictor</h1>
        <p class="subtitle">AI-powered energy generation forecast</p>
    </header>

    <form id="predict-form">
        <div class="form-group">
            <label for="rad"><i class="fas fa-sun"></i> Shortwave Radiation (W/m²)</label>
            <input type="number" id="rad" placeholder="e.g., 24" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="sun"><i class="fas fa-sun"></i> Sunshine Duration (seconds)</label>
            <input type="number" id="sun" placeholder="e.g., 38000" required>
        </div>
        <div class="form-group">
            <label for="cloud"><i class="fas fa-cloud"></i> Cloud Cover (%)</label>
            <input type="number" id="cloud" placeholder="e.g., 30" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="temp"><i class="fas fa-thermometer-half"></i> Temperature 2m (°C)</label>
            <input type="number" id="temp" placeholder="e.g., 26" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="wind"><i class="fas fa-wind"></i> Wind Speed 10m (m/s)</label>
            <input type="number" id="wind" placeholder="e.g., 18" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="rain"><i class="fas fa-droplet"></i> Rain Sum (mm)</label>
            <input type="number" id="rain" placeholder="e.g., 0" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="season"><i class="fas fa-leaf"></i> Season</label>
            <select id="season" required>
                <option value="Dry">Dry</option>
                <option value="Wet">Wet</option>
            </select>
        </div>
        <div class="checkbox-group" onclick="document.getElementById('weekend').click();">
            <input type="checkbox" id="weekend" onclick="event.stopPropagation();">
            <label for="weekend"><i class="fas fa-calendar"></i> Weekend</label>
        </div>

        <button type="submit"><i class="fas fa-bolt"></i> Predict Energy Generation</button>
    </form>

    <div id="result"></div>

    <div class="back-link">
        <a href="/dashboard"><i class="fas fa-chart-line"></i> Go to Analytics Dashboard</a>
    </div>
</main>

<script>

document.getElementById('predict-form')
.addEventListener('submit', async (e) => {

    e.preventDefault();
    
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Processing...</div>';
    resultDiv.classList.add('show');

    const payload = {
        shortwave_radiation_sum: +document.getElementById('rad').value,
        sunshine_duration: +document.getElementById('sun').value,
        cloud_cover_mean: +document.getElementById('cloud').value,
        temperature_2m_mean: +document.getElementById('temp').value,
        wind_speed_10m_mean: +document.getElementById('wind').value,
        rain_sum: +document.getElementById('rain').value,
        season: document.getElementById('season').value,
        is_weekend: document.getElementById('weekend').checked
    };

    try {
        const res = await fetch('/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        const statusClass = data.status === 'Low' ? 'status-warning' : 'status-success';
        const statusIcon = data.status === 'Low' ? 'fa-exclamation-circle' : 'fa-check-circle';
        
        resultDiv.innerHTML = `
            <div class="result-item">
                <span><i class="fas fa-bolt"></i> Predicted Generation:</span>
                <span class="result-value">${data.predicted_generation_kwh} kWh</span>
            </div>
            <div class="result-item">
                <span><i class="fas fa-info-circle"></i> Status:</span>
                <span class="${statusClass}"><i class="fas ${statusIcon}"></i> ${data.status}</span>
            </div>
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(14, 165, 233, 0.2); font-size: 12px; color: #64748b;">
                <i class="fas fa-check"></i> Prediction saved to database
            </div>
        `;
    } catch (error) {
        resultDiv.innerHTML = `<div style="color: #ef4444;"><i class="fas fa-exclamation-triangle"></i> Error: ${error.message}</div>`;
    }
});

</script>

</body>
</html>
