<!DOCTYPE html>
<html>
<head>
    <title>Solar Energy Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        form {
            display: flex;
            flex-direction: column;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            color: #333;
            font-size: 16px;
            display: none;
        }
        
        #result.show {
            display: block;
        }
        
        .status-normal {
            color: #27ae60;
            font-weight: 600;
        }
        
        .status-fraud {
            color: #e74c3c;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ Solar Energy Predictor</h1>

    <form id="predict-form">
        
        <div class="form-group">
            <label for="rad">Shortwave Radiation (W/m²)</label>
            <input type="number" id="rad" placeholder="e.g., 24" step="0.01" required>
        </div>

        <div class="form-group">
            <label for="sun">Sunshine Duration (seconds)</label>
            <input type="number" id="sun" placeholder="e.g., 38000" required>
        </div>

        <div class="form-group">
            <label for="cloud">Cloud Cover (%)</label>
            <input type="number" id="cloud" placeholder="e.g., 30" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="temp">Temperature 2m (°C)</label>
            <input type="number" id="temp" placeholder="e.g., 26" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="wind">Wind Speed 10m (km/h)</label>
            <input type="number" id="wind" placeholder="e.g., 18" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="rain">Rain Sum (mm)</label>
            <input type="number" id="rain" placeholder="e.g., 0" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="season">Season</label>
            <select id="season" required>
                <option value="Dry">Dry</option>
                <option value="Wet">Wet</option>
            </select>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="weekend">
            <label for="weekend">Is Weekend?</label>
        </div>

        <button type="submit">🔮 Predict Energy Generation</button>

    </form>

    <div id="result"></div>
</div>

<script>

document.getElementById('predict-form')
.addEventListener('submit', async (e) => {

    e.preventDefault();
    
    const resultDiv = document.getElementById('result');
    resultDiv.textContent = 'Loading...';
    resultDiv.classList.add('show');

    const payload = {
        shortwave_radiation_sum: +document.getElementById('rad').value,
        sunshine_duration: +document.getElementById('sun').value,
        cloud_cover_mean: +document.getElementById('cloud').value,
        temperature_2m_mean: +document.getElementById('temp').value,
        wind_speed_10m_mean: +document.getElementById('wind').value,
        rain_sum: +document.getElementById('rain').value,
        season: document.getElementById('season').value,
        is_weekend: document.getElementById('weekend').checked
    };

    try {
        const res = await fetch('/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        const statusClass = data.status === 'Fraud' ? 'status-fraud' : 'status-normal';
        resultDiv.innerHTML = `
            <strong>Predicted Generation:</strong> ${data.predicted_generation_kwh} kWh<br>
            <strong>Status:</strong> <span class="${statusClass}">${data.status}</span>
        `;
    } catch (error) {
        resultDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
    }
});

</script>

</body>
</html>
